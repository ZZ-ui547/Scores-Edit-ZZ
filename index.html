<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #e4e4e4;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      color: #222;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 14px;
      background: #fff;
      border-bottom: 1px solid #d4d4d4;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #111;
      white-space: nowrap;
    }

    .sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      flex-shrink: 0;
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ctrl label {
      color: #777;
      white-space: nowrap;
    }

    select, input[type="number"] {
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 4px 6px;
      font-size: 13px;
      background: #fff;
      color: #222;
      min-height: 32px;
    }

    select:focus, input:focus { outline: 2px solid #bbb; outline-offset: 1px; }

    #export-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.02em;
      min-height: 32px;
      white-space: nowrap;
    }
    #export-btn:hover { background: #333; }

    /* ── Tab bar (mobile only) ────────────────────────────── */
    #tab-bar {
      display: none;
      flex-shrink: 0;
      border-bottom: 1px solid #d4d4d4;
      background: #fff;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: #111;
      border-bottom-color: #111;
    }

    /* ── Main layout ──────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Editor panel ─────────────────────────────────────── */
    #editor-panel {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #d4d4d4;
    }

    #editor-label {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    #abc-input {
      flex: 1;
      resize: none;
      border: none;
      padding: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.65;
      background: #fff;
      color: #222;
      outline: none;
    }

    /* ── Score panel ──────────────────────────────────────── */
    #score-panel {
      flex: 1;
      overflow: auto;
      background: #e4e4e4;
      padding: 28px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #score-page {
      background: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.18);
      padding: 18mm 15mm;
      width: 210mm;
      min-height: 297mm;
      flex-shrink: 0;
    }

    #score-output svg {
      width: 100% !important;
      height: auto !important;
    }

    /* ── Mobile ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      /* Toolbar: two rows */
      #toolbar {
        flex-wrap: wrap;
        gap: 8px 10px;
        padding: 8px 12px;
      }

      #toolbar h1 { flex: 1; order: 0; }

      #export-btn { order: 0; min-height: 40px; font-size: 14px; padding: 8px 14px; }

      .sep { display: none; }

      .ctrl { order: 1; }

      /* Instrument select stretches on row 2 */
      #ctrl-instrument { flex: 1; min-width: 0; }
      #ctrl-instrument select { width: 100%; min-width: 0; }

      /* Prevent iOS input zoom */
      select, input[type="number"] { font-size: 16px; min-height: 40px; }

      /* Tabs + panels */
      #tab-bar { display: flex; }

      #main { position: relative; }

      #editor-panel, #score-panel {
        position: absolute;
        inset: 0;
        width: 100%;
        display: none;
      }
      #editor-panel.active, #score-panel.active { display: flex; }

      #editor-panel { border-right: none; flex-direction: column; }
      #abc-input { font-size: 14px; padding: 14px; }

      #score-panel {
        background: #fff;
        padding: 12px;
        overflow-y: auto;
        justify-content: flex-start;
        align-items: stretch;
      }

      #score-page { box-shadow: none; padding: 0; width: 100%; min-height: 0; }
    }

    /* ── Print / PDF ──────────────────────────────────────── */
    @media print {
      @page { size: A4 portrait; margin: 15mm; }

      body    { background: #fff; height: auto; }
      #toolbar, #editor-panel, #tab-bar { display: none !important; }
      #main   { display: block; overflow: visible; }

      #score-panel {
        background: none;
        padding: 0;
        overflow: visible;
        display: block;
        position: static;
        width: 100%;
      }

      #score-page { box-shadow: none; padding: 0; width: 100%; min-height: 0; }

      #score-output svg { width: 100% !important; }

      .print-page { break-inside: avoid; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Score Editor</h1>
  <div class="sep"></div>
  <div class="ctrl" id="ctrl-instrument">
    <label for="transpose-select">Instrument</label>
    <select id="transpose-select">
      <option value="0">Concert (C)</option>
      <option value="0">Violin</option>
      <option value="2">B♭ — Trumpet, Clarinet, Sop./Ten. Sax</option>
      <option value="9">E♭ — Alto / Bari Sax</option>
      <option value="7">F — French Horn</option>
      <option value="custom">Custom…</option>
    </select>
  </div>
  <div class="ctrl" id="custom-ctrl" style="display:none">
    <label for="custom-semi">Semitones</label>
    <input type="number" id="custom-semi" value="0" min="-24" max="24" style="width:60px">
  </div>
  <div class="sep"></div>
  <div class="ctrl" id="ctrl-bars">
    <label for="bars-input">Bars / line</label>
    <input type="number" id="bars-input" value="4" min="1" max="20" style="width:54px">
  </div>
  <button id="export-btn">Export PDF</button>
</div>

<div id="tab-bar">
  <button class="tab active" data-panel="editor-panel">Editor</button>
  <button class="tab" data-panel="score-panel">Score</button>
</div>

<div id="main">
  <div id="editor-panel" class="active">
    <div id="editor-label">ABC Notation</div>
    <textarea id="abc-input" spellcheck="false">X:1
T:Sample Score
C:Composer
M:4/4
L:1/8
Q:1/4=120
K:C
|:CDEF GABc|dedB AGFE|DCDE FGAB|cBAG FEDC:|
|:c2ec B2dB|A2FA G2EG|FGAB cdef|gedB c3B:|
|:AGFE DCBA,|B,CDE FGAB|cBAG FEDC|DEFD C4:|</textarea>
  </div>

  <div id="score-panel">
    <div id="score-page">
      <div id="score-output"></div>
    </div>
  </div>
</div>

<script>
  const abcInput   = document.getElementById('abc-input');
  const transpSel  = document.getElementById('transpose-select');
  const customCtrl = document.getElementById('custom-ctrl');
  const customSemi = document.getElementById('custom-semi');
  const barsInput  = document.getElementById('bars-input');
  const exportBtn  = document.getElementById('export-btn');

  function transpose() {
    return transpSel.value === 'custom'
      ? (parseInt(customSemi.value) || 0)
      : parseInt(transpSel.value);
  }

  function render() {
    ABCJS.renderAbc('score-output', abcInput.value, {
      responsive:      'resize',
      visualTranspose: transpose(),
      barsperstaff:    parseInt(barsInput.value) || 4,
      paddingleft:     0,
      paddingright:    0,
      paddingtop:      0,
    });
  }

  // ── PDF pagination ──────────────────────────────────────
  // Splits the rendered SVG into page-height slices so the
  // browser print engine never cuts through a staff row.
  function buildPrintPages() {
    const output = document.getElementById('score-output');
    document.getElementById('print-pages')?.remove();

    const svg = output.querySelector('svg');
    if (!svg) return;

    const vb = svg.viewBox.baseVal;
    if (!vb || vb.width === 0) return;

    // A4 with 15mm margins → 180 mm × 267 mm usable area.
    // SVG fills the 180 mm width, so page height in SVG units:
    const pageH = vb.width * (267 / 180);

    // Find staff rows – try the class names abcjs 6.x uses
    let rows = [];
    for (const sel of ['.abcjs-staff-group', '.abcjs-row', '.abcjs-system']) {
      rows = [...svg.querySelectorAll(sel)];
      if (rows.length) break;
    }
    if (!rows.length) return;

    // Measure each row's vertical extent
    const measured = rows.map(r => {
      const b = r.getBBox();
      return { top: b.y, bottom: b.y + b.height };
    }).filter(m => m.bottom > m.top);

    if (!measured.length) return;
    if (measured.at(-1).bottom <= pageH) return; // fits on one page

    // Group rows into pages
    const pages = [];
    let start = 0, batch = [];

    for (const row of measured) {
      if (row.bottom - start > pageH && batch.length) {
        pages.push({ startY: start, endY: batch.at(-1).bottom });
        start = row.top;
        batch = [row];
      } else {
        batch.push(row);
      }
    }
    if (batch.length) pages.push({ startY: start, endY: batch.at(-1).bottom });

    if (pages.length < 2) return;

    // Hide the original SVG for print; we'll restore it in afterprint
    svg.dataset.printHidden = '1';
    svg.style.display = 'none';

    const svgHTML    = svg.innerHTML;
    const container  = document.createElement('div');
    container.id     = 'print-pages';

    pages.forEach((page, i) => {
      // Page 1 starts from Y=0 to capture the title/header above the staves
      const clipY = i === 0 ? 0 : page.startY;
      const clipH = page.endY - clipY;

      const div = document.createElement('div');
      div.className = 'print-page';
      if (i > 0) {
        div.style.cssText = 'break-before:page;page-break-before:always';
      }

      const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      s.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      s.setAttribute('viewBox', `${vb.x} ${clipY} ${vb.width} ${clipH}`);
      s.style.cssText = 'width:100%;height:auto;display:block';
      s.innerHTML = svgHTML;

      div.appendChild(s);
      container.appendChild(div);
    });

    output.appendChild(container);
  }

  function restoreAfterPrint() {
    document.getElementById('print-pages')?.remove();
    const hidden = document.querySelector('#score-output svg[data-print-hidden]');
    if (hidden) {
      hidden.style.display = '';
      delete hidden.dataset.printHidden;
    }
  }

  exportBtn.addEventListener('click', () => {
    buildPrintPages();
    window.print();
  });

  // Also handle Ctrl+P / system print
  window.addEventListener('beforeprint', buildPrintPages);
  window.addEventListener('afterprint',  restoreAfterPrint);

  // ── Controls ────────────────────────────────────────────
  transpSel.addEventListener('change', () => {
    customCtrl.style.display = transpSel.value === 'custom' ? 'flex' : 'none';
    render();
  });

  customSemi.addEventListener('input', render);
  barsInput.addEventListener('input', render);
  abcInput.addEventListener('input', render);

  // ── Tab switching (mobile) ───────────────────────────────
  document.getElementById('tab-bar').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('#main > div').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'score-panel') render();
  });

  render();
</script>

</body>
</html>
